camera:
  host: 192.168.0.227
  port: 554
  path: /h264Preview_01_main          # main stream (2048x1536). Single-stream
                                      # pipeline: YOLO + tracking + thumbnails
                                      # all come from this one source.
  # static_frame_path: calibration_main_frame.jpg
  #   Optional dev/test mode. When set, the capture worker loops this JPEG
  #   at the camera's nominal rate instead of opening RTSP. Useful when the
  #   real camera is being served by another host and we don't want to
  #   contend for the main stream.
  # User and pass come from .env (REOLINK_USER, REOLINK_PASS)

model:
  weights: yolo11l.pt        # 2048x1536 main-stream + 3060 Ti: track p50 ≈ 29ms,
                             # ~1.7x headroom over the 20fps camera rate. Smaller
                             # variants (n/s/m) work too; x is feasible but tight.
  device: auto             # auto → cuda > cpu. Set explicitly
                           # ("cuda", "cpu", "cuda:0") to override.
  conf: 0.35             # daytime default; lower to ~0.20 if you ever run at night
  iou: 0.5
  classes: [2, 3, 5, 7]    # COCO: car, motorcycle, bus, truck
  conf_per_class:          # optional per-class minimums (by COCO class name);
    motorcycle: 0.60       # raises the bar above `conf` for confusion-prone
                           # classes (e.g. strollers misread as motorcycle).
                           # Values <= `conf` have no effect.

alert:
  threshold_mph: 40

paths:
  events_dir: events
  calibration: config/calibration.yaml

speed:
  max_track_age_s: 5.0     # drop tracks idle this long without crossing both lines

retention:
  # Three-phase retention. Set any phase to 0 to disable it; typical layout
  # is clips_days < thumbs_days < passes_days.
  clips_days: 14           # delete .mp4 only; thumbnail + DB row stay so the
                           # list still shows the still image and stats.
  thumbs_days: 90          # delete .jpg too; clip_path is NULLed so the UI
                           # hides the playback affordance.
  passes_days: 365         # hard-delete the DB row + events/pass_*.jsonl.
  # Backwards-compat: if `clips_days` / `thumbs_days` are absent, the older
  # single-knob `recordings_days` (or even older `days`) is read for both.

heatmap:
  days: 8                  # trailing-N-day window for the activity heatmap. 1..14.

clip:
  margin_s: 0.5            # seconds of pre-roll before the first crossing and post-roll after the last
  capture_min_mph: 0       # passes below this speed are logged with a thumbnail but no .mp4
  capture_max_mph: 999     # passes above this speed are logged with a thumbnail but no .mp4

recorder:
  # Optional inset for the entry/exit anchor JPEGs, in feet, inward from the
  # grid boundary. Speed measurement still uses the full grid trajectory;
  # only the still-image capture point shifts. Useful when a fixed obstruction
  # (e.g. a tree at one curb) lands near a grid edge.
  anchor_inset_ft:
    south: 0               # north of Y_MIN; 0 keeps anchor at the grid south edge
    north: 0               # south of Y_MAX; 0 keeps anchor at the grid north edge
