[project]
name = "camwatch"
version = "0.1.0"
description = "Local traffic speed monitor — Reolink RTSP + YOLO + two-line crossing speed estimation"
requires-python = ">=3.12,<3.13"
dependencies = [
    "ultralytics>=8.3.0",
    "lap>=0.5.12",
    "opencv-python>=4.10.0",
    "numpy>=1.26",
    "pyyaml>=6.0",
    "python-dotenv>=1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["camwatch"]

[tool.uv]
package = true
