<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>camwatch</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://unpkg.com/htmx.org@2.0.4" integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+" crossorigin="anonymous"></script>
</head>
<body>
  <header>
    <div class="title-row">
      <h1>camwatch</h1>
      <span class="status-badge" id="status">{% if running %}● live{% else %}○ idle{% endif %}</span>
      <button type="button" class="settings-btn" title="Settings"
              onclick="document.getElementById('settings-dialog').showModal()">⚙</button>
    </div>
    <div id="status-panel">
      {% include "_status.html" %}
    </div>
  </header>

  <dialog id="settings-dialog" class="settings-dialog">
    <div class="settings-header">
      <h2>Settings</h2>
      <form method="dialog"><button class="muted-btn" aria-label="close">✕</button></form>
    </div>

    <form class="settings-form"
          hx-post="/settings"
          hx-target="#status-panel"
          hx-swap="innerHTML"
          hx-on::after-request="document.getElementById('settings-dialog').close()">
      <section class="settings-section">
        <h3>Alarm speed</h3>
        <p class="muted-text">Passes at or above this speed get the 🚨 marker in the list.</p>
        <div class="setting-row">
          <input type="number" name="threshold_mph" value="{{ threshold }}" step="1" min="1" max="200">
          <span>mph</span>
        </div>
      </section>

      <section class="settings-section">
        <h3>Live preview</h3>
        <label class="setting-row">
          <input type="checkbox" name="show_lines" value="true" checked>
          <span>Show crossing lines on the live preview</span>
        </label>
      </section>

      <div class="settings-footer">
        <button type="button" class="muted-btn"
                onclick="document.getElementById('settings-dialog').close()">Cancel</button>
        <button type="submit" class="primary-btn">Save</button>
      </div>
    </form>
  </dialog>

  <section class="preview-section">
    <div class="preview-header">
      <h2>Live preview</h2>
      <button type="button" class="muted-btn" id="preview-toggle" onclick="togglePreview()">hide</button>
    </div>
    <div class="preview-frame" id="preview-frame">
      <img src="/preview/stream" alt="live preview" id="preview-img">
    </div>
  </section>

  <section class="controls">
    <form id="filter-form" hx-get="/passes" hx-target="#pass-list" hx-trigger="change, every 10s" hx-include="#filter-form, #histogram">
      <label>direction
        <select name="direction">
          <option value="">all</option>
          <option value="N">N</option>
          <option value="S">S</option>
        </select>
      </label>
      <label class="checkbox"><input type="checkbox" name="alerts_only" value="true"> alerts only</label>
      <label>from <input type="datetime-local" name="from_ts"></label>
      <label>to <input type="datetime-local" name="to_ts"></label>
    </form>
    <div class="actions">
      <button type="button" id="select-toggle" onclick="toggleSelection()">Select…</button>
      <button type="button" id="delete-btn" class="danger hidden" onclick="deleteSelected()">Delete selected</button>
      <button type="button" id="cancel-btn" class="hidden" onclick="toggleSelection()">Cancel</button>
    </div>
  </section>

  <section id="histogram" class="histogram-section"
           hx-get="/passes"
           hx-trigger="change"
           hx-target="#pass-list"
           hx-include="#filter-form, #histogram">
    {% include "_histogram.html" %}
  </section>

  <main>
    <div id="pass-list">
      {% include "_pass_list.html" %}
    </div>
  </main>

  <script>
    let selectionMode = false;
    function toggleSelection() {
      selectionMode = !selectionMode;
      document.body.classList.toggle("selection-mode", selectionMode);
      document.getElementById("select-toggle").classList.toggle("hidden", selectionMode);
      document.getElementById("delete-btn").classList.toggle("hidden", !selectionMode);
      document.getElementById("cancel-btn").classList.toggle("hidden", !selectionMode);
      if (!selectionMode) {
        document.querySelectorAll('input[name="ids"]').forEach(cb => cb.checked = false);
      }
    }

    async function deleteSelected() {
      const ids = [...document.querySelectorAll('input[name="ids"]:checked')].map(cb => cb.value);
      if (ids.length === 0) return;
      if (!confirm(`Delete ${ids.length} pass${ids.length === 1 ? '' : 'es'}?`)) return;
      const fd = new FormData();
      ids.forEach(id => fd.append("ids", id));
      await fetch("/passes/delete", { method: "POST", body: fd });
      toggleSelection();
      htmx.trigger("#filter-form", "change");
    }

    function toggleMenu(btn) {
      const menu = btn.nextElementSibling;
      const wasOpen = menu.classList.contains("open");
      document.querySelectorAll(".kebab-menu.open").forEach(m => m.classList.remove("open"));
      if (!wasOpen) menu.classList.add("open");
    }

    document.addEventListener("click", (e) => {
      if (!e.target.closest(".kebab-wrap")) {
        document.querySelectorAll(".kebab-menu.open").forEach(m => m.classList.remove("open"));
      }
    });

    function startKnownInput(passId) {
      const row = document.getElementById(`pass-${passId}`);
      const inputWrap = row.querySelector(".known-input-wrap");
      inputWrap.classList.remove("hidden");
      inputWrap.querySelector('input[name="known_mph"]').focus();
      document.querySelectorAll(".kebab-menu.open").forEach(m => m.classList.remove("open"));
    }

    // Toggle the inline video player open/closed for a pass row.
    function togglePlay(passId) {
      const row = document.getElementById(`pass-${passId}`);
      if (!row) return;
      const wrap = row.querySelector(".video-wrap");
      if (!wrap) return;
      // Close any other open player (only one at a time).
      document.querySelectorAll(".pass-row .video-wrap").forEach(w => {
        if (w !== wrap && !w.classList.contains("hidden")) {
          w.querySelector("video")?.pause();
          w.innerHTML = "";
          w.classList.add("hidden");
        }
      });
      if (wrap.classList.contains("hidden")) {
        wrap.innerHTML = `<video controls autoplay playsinline src="/passes/${passId}/clip"></video>`;
        wrap.classList.remove("hidden");
      } else {
        wrap.querySelector("video")?.pause();
        wrap.innerHTML = "";
        wrap.classList.add("hidden");
      }
    }

    // The dedicated ▶ button: if open, restart from 0; if closed, open and play.
    function restartPlay(passId) {
      const row = document.getElementById(`pass-${passId}`);
      if (!row) return;
      const wrap = row.querySelector(".video-wrap");
      if (wrap && !wrap.classList.contains("hidden")) {
        const v = wrap.querySelector("video");
        if (v) {
          v.currentTime = 0;
          v.play();
          return;
        }
      }
      togglePlay(passId);
    }

    // Click anywhere on the row (except interactive areas) toggles the player.
    function rowClick(event, passId) {
      if (
        event.target.closest(".row-actions") ||
        event.target.closest(".kebab-menu") ||
        event.target.closest(".known-input-wrap") ||
        event.target.closest(".video-wrap") ||
        event.target.closest(".select-cell")
      ) {
        return;
      }
      togglePlay(passId);
    }

    // Pause the auto-refresh poll while any video is open, so the list rerender
    // doesn't wipe the <video> element mid-playback. Cancels every filter-form
    // request (including the timer poll AND manual filter changes) while a
    // video is open. User has to close the player to change direction filter.
    document.body.addEventListener("htmx:beforeRequest", (e) => {
      const elt = e.detail && e.detail.elt;
      if (!elt || elt.id !== "filter-form") return;
      if (document.querySelector(".pass-row .video-wrap:not(.hidden)")) {
        e.preventDefault();
      }
    });

    function togglePreview() {
      const frame = document.getElementById("preview-frame");
      const img = document.getElementById("preview-img");
      const btn = document.getElementById("preview-toggle");
      const hidden = frame.classList.toggle("hidden");
      btn.textContent = hidden ? "show" : "hide";
      // Detach src when hidden so we stop pulling MJPEG bytes.
      if (hidden) {
        img.dataset.src = img.src;
        img.removeAttribute("src");
      } else if (img.dataset.src) {
        img.src = img.dataset.src;
      } else {
        img.src = "/preview/stream";
      }
    }
  </script>
</body>
</html>
